# ==========================================================================
# EaseTrading — local development stack.
# Brings up everything with one command:  docker compose up --build
#
#   postgres  : relational store + TimescaleDB extension (time-series candles)
#   redis     : hot quotes cache + pub/sub fan-out of live ticks
#   api       : Spring Boot core backend
#   analysis  : Python FastAPI (skeleton in Prompt 1)
#   web       : Next.js frontend
# ==========================================================================
services:
  postgres:
    # TimescaleDB image = PostgreSQL + the Timescale extension preinstalled.
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ../apps/api
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DB_URL: ${DB_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      CREDENTIAL_AES_KEY: ${CREDENTIAL_AES_KEY}
      MARKET_FEED_MODE: ${MARKET_FEED_MODE}
      ANGEL_ONE_API_KEY: ${ANGEL_ONE_API_KEY}
      ANGEL_ONE_CLIENT_ID: ${ANGEL_ONE_CLIENT_ID}
      ANGEL_ONE_PASSWORD: ${ANGEL_ONE_PASSWORD}
      ANGEL_ONE_TOTP_SECRET: ${ANGEL_ONE_TOTP_SECRET}
      ANALYSIS_SERVICE_URL: ${ANALYSIS_SERVICE_URL}
      TRADING_MODE: ${TRADING_MODE}
      RISK_MAX_ORDER_VALUE: ${RISK_MAX_ORDER_VALUE}
      RISK_MAX_POSITION_PCT: ${RISK_MAX_POSITION_PCT}
      RISK_DAILY_LOSS_LIMIT: ${RISK_DAILY_LOSS_LIMIT}
      RISK_PRICE_BAND_PCT: ${RISK_PRICE_BAND_PCT}
    ports:
      - "8080:8080"

  analysis:
    build: ../apps/analysis
    environment:
      FUNDAMENTALS_MODE: ${FUNDAMENTALS_MODE}
      API_BASE_URL: http://api:8080
    ports:
      - "8000:8000"

  web:
    build: ../apps/web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL}
    ports:
      - "3000:3000"

volumes:
  pgdata:
