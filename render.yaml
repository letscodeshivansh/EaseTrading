# ==========================================================================
# Render Blueprint — deploys the EaseTrading backend as one stack:
#   - easetrading-db       : managed PostgreSQL (free)
#   - easetrading-redis    : managed Redis / Key Value (free)
#   - easetrading-analysis : Python FastAPI service (free web service)
#   - easetrading-api      : Spring Boot API (free web service)
#
# How to use: in the Render dashboard -> New -> Blueprint -> pick this repo.
# Render reads this file and creates all four resources automatically.
#
# The frontend stays on Vercel; after this deploys, point Vercel's
# NEXT_PUBLIC_API_BASE_URL / NEXT_PUBLIC_WS_BASE_URL at the API's URL.
# ==========================================================================

databases:
  - name: easetrading-db
    plan: free
    databaseName: easetrading
    user: easetrading

services:
  # ---- Redis (Render Key Value) : hot quotes cache + pub/sub fan-out ----
  - type: redis
    name: easetrading-redis
    plan: free
    ipAllowList: []          # internal connections only (no public access)

  # ---- Python analysis service (indicators, screener, AI verdicts) ----
  - type: web
    runtime: docker
    name: easetrading-analysis
    plan: free
    dockerfilePath: apps/analysis/Dockerfile
    dockerContext: apps/analysis
    healthCheckPath: /health
    envVars:
      - key: FUNDAMENTALS_MODE
        value: mock          # switch to "auto" later for real Yahoo/NSE data

  # ---- Spring Boot API (system of record) ----
  - type: web
    runtime: docker
    name: easetrading-api
    plan: free
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    healthCheckPath: /api/health
    envVars:
      # Keep the JVM within Render's 512MB free RAM.
      - key: JAVA_TOOL_OPTIONS
        value: -XX:MaxRAMPercentage=70
      # Safe defaults: simulated data + paper trading.
      - key: MARKET_FEED_MODE
        value: mock
      - key: TRADING_MODE
        value: paper
      # Auto-generated JWT signing secret.
      - key: JWT_SECRET
        generateValue: true
      # Optional: set a real base64 key later (openssl rand -base64 32). If blank,
      # the app uses a temporary key (fine for mock/paper mode).
      - key: CREDENTIAL_AES_KEY
        sync: false
      # Database connection — wired automatically from the managed Postgres above.
      - key: DB_HOST
        fromDatabase: { name: easetrading-db, property: host }
      - key: DB_PORT
        fromDatabase: { name: easetrading-db, property: port }
      - key: DB_NAME
        fromDatabase: { name: easetrading-db, property: database }
      - key: POSTGRES_USER
        fromDatabase: { name: easetrading-db, property: user }
      - key: POSTGRES_PASSWORD
        fromDatabase: { name: easetrading-db, property: password }
      # Redis connection — wired automatically from the Key Value instance above.
      - key: REDIS_URL
        fromService: { name: easetrading-redis, type: redis, property: connectionString }
      # Set these two manually in the dashboard after the first deploy:
      #   ANALYSIS_SERVICE_URL -> the easetrading-analysis service URL (https://...)
      #   CORS_ALLOWED_ORIGINS -> your Vercel URL (optional; *.vercel.app is allowed by default)
      - key: ANALYSIS_SERVICE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
